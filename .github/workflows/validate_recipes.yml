name: Validate Recipes

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to validate"
        required: false
        default: ""
        type: string
      recipe_file:
        description: "Optional single recipe path to validate (for example data/recipes/pollo_asiatico.yml)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Check out requested ref
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.pr_number != '' && format('refs/pull/{0}/head', inputs.pr_number) || github.ref }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        cd planner
        pip install -e .[dev]

    - name: Validate recipe data set
      id: validate_data
      continue-on-error: true
      run: |
        set +e
        mealplanner validate-data data 2>&1 | tee validate_data.log
        status=${PIPESTATUS[0]}
        set -e
        {
          echo 'log<<EOF'
          tail -n 40 validate_data.log
          echo EOF
        } >> "$GITHUB_OUTPUT"
        exit "$status"

    - name: Validate single recipe when requested
      id: validate_recipe
      if: ${{ inputs.recipe_file != '' }}
      continue-on-error: true
      run: |
        set +e
        mealplanner validate-recipe "${{ inputs.recipe_file }}" 2>&1 | tee validate_recipe.log
        status=${PIPESTATUS[0]}
        set -e
        {
          echo 'log<<EOF'
          tail -n 40 validate_recipe.log
          echo EOF
        } >> "$GITHUB_OUTPUT"
        exit "$status"

    - name: Run validator tests
      id: run_tests
      continue-on-error: true
      run: |
        set +e
        cd planner
        pytest 2>&1 | tee ../run_tests.log
        status=${PIPESTATUS[0]}
        set -e
        {
          echo 'log<<EOF'
          tail -n 60 ../run_tests.log
          echo EOF
        } >> "$GITHUB_OUTPUT"
        exit "$status"

    - name: Comment on PR
      if: ${{ always() && inputs.pr_number != '' }}
      uses: actions/github-script@v7
      env:
        VALIDATE_DATA_OUTCOME: ${{ steps.validate_data.outcome }}
        VALIDATE_DATA_LOG: ${{ steps.validate_data.outputs.log }}
        VALIDATE_RECIPE_OUTCOME: ${{ steps.validate_recipe.outcome }}
        VALIDATE_RECIPE_LOG: ${{ steps.validate_recipe.outputs.log }}
        RUN_TESTS_OUTCOME: ${{ steps.run_tests.outcome }}
        RUN_TESTS_LOG: ${{ steps.run_tests.outputs.log }}
      with:
        script: |
          const prNumber = Number(context.payload.inputs.pr_number)
          const recipeFile = context.payload.inputs.recipe_file || ''
          const dataOutcome = process.env.VALIDATE_DATA_OUTCOME || 'skipped'
          const dataLog = process.env.VALIDATE_DATA_LOG || ''
          const recipeOutcome = recipeFile ? (process.env.VALIDATE_RECIPE_OUTCOME || 'skipped') : 'skipped'
          const recipeLog = process.env.VALIDATE_RECIPE_LOG || ''
          const testsOutcome = process.env.RUN_TESTS_OUTCOME || 'skipped'
          const testsLog = process.env.RUN_TESTS_LOG || ''

          const toStatus = (outcome) => {
            if (outcome === 'success') return 'PASS'
            if (outcome === 'failure') return 'FAIL'
            return 'SKIPPED'
          }

          const addFailureDetails = (lines, title, outcome, log) => {
            if (outcome !== 'failure' || !log.trim()) return
            lines.push('')
            lines.push(`<details><summary>${title}</summary>`)
            lines.push('')
            lines.push('```text')
            lines.push(log.trim())
            lines.push('```')
            lines.push('</details>')
          }

          const marker = '<!-- mealplanner-validate-recipes -->'
          const lines = [
            marker,
            '## Recipe Validation',
            '',
            `- Dataset validation: ${toStatus(dataOutcome)}`,
            `- Validator tests: ${toStatus(testsOutcome)}`,
          ]

          if (recipeFile) {
            lines.push(`- Single recipe \`${recipeFile}\`: ${toStatus(recipeOutcome)}`)
          }

          addFailureDetails(lines, 'Dataset validation failure', dataOutcome, dataLog)
          if (recipeFile) {
            addFailureDetails(lines, `Single recipe failure: ${recipeFile}`, recipeOutcome, recipeLog)
          }
          addFailureDetails(lines, 'Validator test failure', testsOutcome, testsLog)

          lines.push('')
          lines.push(`Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`)

          const body = lines.join('\n')
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            per_page: 100,
          })

          const existing = comments.find((comment) => comment.body && comment.body.includes(marker))

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            })
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            })
          }

    - name: Summary
      if: ${{ always() }}
      run: |
        echo "### Recipe validation completed" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        if [ -n "${{ inputs.pr_number }}" ]; then
          echo "- PR: #${{ inputs.pr_number }}" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "- PR: current ref" >> "$GITHUB_STEP_SUMMARY"
        fi
        if [ -n "${{ inputs.recipe_file }}" ]; then
          echo "- Single recipe: \`${{ inputs.recipe_file }}\`" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "- Single recipe: not requested" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Fail workflow if validation failed
      if: ${{ always() }}
      run: |
        if [ "${{ steps.validate_data.outcome }}" = "failure" ]; then
          echo "Dataset validation failed" >&2
          exit 1
        fi

        if [ -n "${{ inputs.recipe_file }}" ] && [ "${{ steps.validate_recipe.outcome }}" = "failure" ]; then
          echo "Single recipe validation failed" >&2
          exit 1
        fi

        if [ "${{ steps.run_tests.outcome }}" = "failure" ]; then
          echo "Validator tests failed" >&2
          exit 1
        fi
